<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI OS — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d14;
      color: #e8e6e1;
      font-family: system-ui, sans-serif;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #7B68EE;
    }
    p {
      color: #a09d95;
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }
    button {
      background: #7B68EE;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <h1>You're Offline</h1>
    <p>AI OS needs an internet connection to sync with Cloud SQL.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
