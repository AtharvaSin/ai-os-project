<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    font-family: var(--font-primary, 'DM Sans', 'Segoe UI', sans-serif);
    background: var(--bg-color, #0F1419);
    color: var(--text-color, #FFFFFF);
    position: relative;
  }
  .bg-image {
    position: absolute;
    inset: 0;
    background-image: var(--bg-image);
    background-size: cover;
    background-position: center;
    opacity: var(--bg-opacity, 0.5);
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      135deg,
      rgba(15, 20, 25, 0.9) 0%,
      rgba(15, 20, 25, 0.5) 50%,
      rgba(15, 20, 25, 0.7) 100%
    );
  }
  /* Face overlay zone — right side */
  .face-zone {
    position: absolute;
    right: 0;
    bottom: 0;
    width: 400px;
    height: 100%;
    z-index: 1;
  }
  .face-zone img {
    position: absolute;
    bottom: 0;
    right: 20px;
    max-height: 100%;
    max-width: 380px;
    object-fit: contain;
  }
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 100%;
    padding: 48px 56px;
    max-width: 820px;
  }
  .badge {
    display: inline-block;
    padding: 6px 16px;
    background: var(--accent-color, #00D492);
    color: #0F1419;
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-radius: 4px;
    margin-bottom: 18px;
    width: fit-content;
  }
  .title {
    font-size: 56px;
    font-weight: 800;
    line-height: 1.05;
    margin-bottom: 16px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
  }
  .title em {
    font-style: normal;
    color: var(--accent-color, #00D492);
  }
  .subtitle {
    font-size: 22px;
    font-weight: 500;
    opacity: 0.9;
    line-height: 1.3;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>
  <div class="bg-image" style="--bg-image: url('{{bg_image_url}}'); --bg-opacity: {{bg_opacity}};"></div>
  <div class="overlay"></div>
  <div class="face-zone">
    <!-- Face cutout image can be overlaid here -->
  </div>
  <div class="content">
    <div class="badge" style="--accent-color: {{accent_color}};">{{badge_text}}</div>
    <div class="title">{{title}}</div>
    <div class="subtitle">{{subtitle}}</div>
  </div>
</body>
</html>
