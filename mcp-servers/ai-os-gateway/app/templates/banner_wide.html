<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px;
    height: 480px;
    overflow: hidden;
    font-family: var(--font-primary, 'DM Sans', 'Segoe UI', sans-serif);
    background: var(--bg-color, #0F1419);
    color: var(--text-color, #FFFFFF);
    position: relative;
  }
  .bg-image {
    position: absolute;
    inset: 0;
    background-image: var(--bg-image);
    background-size: cover;
    background-position: center;
    opacity: var(--bg-opacity, 0.3);
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      90deg,
      rgba(15, 20, 25, 0.95) 0%,
      rgba(15, 20, 25, 0.6) 40%,
      rgba(15, 20, 25, 0.3) 70%,
      rgba(15, 20, 25, 0.6) 100%
    );
  }
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 100%;
    padding: 40px 80px;
    max-width: 900px;
  }
  .accent-bar {
    width: 60px;
    height: 3px;
    background: var(--accent-color, #00D492);
    margin-bottom: 16px;
    border-radius: 2px;
  }
  .title {
    font-size: 48px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 12px;
  }
  .subtitle {
    font-size: 20px;
    font-weight: 400;
    opacity: 0.8;
    line-height: 1.4;
  }
  .right-accent {
    position: absolute;
    right: 80px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
    text-align: right;
  }
  .right-accent .tag {
    font-size: 14px;
    font-family: var(--font-mono, 'JetBrains Mono', monospace);
    opacity: 0.6;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="bg-image" style="--bg-image: url('{{bg_image_url}}'); --bg-opacity: {{bg_opacity}};"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="accent-bar" style="--accent-color: {{accent_color}};"></div>
    <div class="title">{{title}}</div>
    <div class="subtitle">{{subtitle}}</div>
  </div>
  <div class="right-accent">
    <div class="tag">{{footer_tag}}</div>
  </div>
</body>
</html>
