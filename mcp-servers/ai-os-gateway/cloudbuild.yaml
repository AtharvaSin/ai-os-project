steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/ai-os-gateway:$SHORT_SHA', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/ai-os-gateway:$SHORT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ai-os-gateway'
      - '--image=asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/ai-os-gateway:$SHORT_SHA'
      - '--region=asia-south1'
      - '--service-account=ai-os-cloud-run@ai-operating-system-490208.iam.gserviceaccount.com'
      - '--add-cloudsql-instances=bharatvarsh-website:us-central1:bharatvarsh-db'
      - '--set-secrets=DB_PASSWORD=AI_OS_DB_PASSWORD:latest,API_KEY=MCP_GATEWAY_API_KEY:latest'
      - '--min-instances=0'
      - '--allow-unauthenticated'
images:
  - 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/ai-os-gateway:$SHORT_SHA'
