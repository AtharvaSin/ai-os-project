<!DOCTYPE html>
<!--
  Bharatvarsh Content Ops — Behind-the-Build Card (Instagram Feed)
  Dimensions: 1080×1080 (1:1)
  Template ID: BHV-T-BTS-IG

  Slot variables (pass via URL params or JS injection):
    backgroundImage  — URL or base64 of background image
    headline         — Main headline
    bodyText         — Extended body text (more space for copy)

  Rendering: Puppeteer screenshot at 1080×1080 viewport.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --obsidian-950: #0A0D12;
      --obsidian-900: #0F1419;
      --obsidian-800: #1A1F2E;
      --obsidian-700: #252A3B;
      --obsidian-600: #323848;
      --mustard-500: #F1C232;
      --mustard-400: #F5D56A;
      --powder-300: #C9DBEE;
      --b-text-primary: #F0F4F8;
      --b-text-secondary: #A0AEC0;
      --b-text-muted: #718096;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: var(--obsidian-900);
      font-family: 'Inter', sans-serif;
    }

    .canvas {
      position: relative;
      width: 1080px;
      height: 1080px;
      overflow: hidden;
    }

    /* ── Background Image ── */
    .bg-image {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-size: cover;
      background-position: center;
      z-index: 1;
    }

    /* ── Dark Overlay (75%) ── */
    .dark-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 5;
      background: rgba(15, 20, 25, 0.75);
    }

    /* ── Film Grain ── */
    .film-grain::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px;
    }

    /* ── Vignette ── */
    .vignette::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 8;
      background: radial-gradient(
        ellipse at center,
        transparent 40%,
        rgba(10, 13, 18, 0.4) 75%,
        rgba(10, 13, 18, 0.7) 100%
      );
    }

    /* ── Content Layer ── */
    .content {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 20;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 120px 72px 80px 72px;
    }

    /* ── Accent Bar ── */
    .accent-bar {
      width: 70px;
      height: 3px;
      background: var(--mustard-500);
      margin-bottom: 28px;
      opacity: 0.7;
    }

    /* ── Headline ── */
    .headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      line-height: 1.15;
      letter-spacing: 2px;
      color: var(--mustard-500);
      text-shadow: 0 0 30px rgba(241, 194, 50, 0.15);
      margin-bottom: 32px;
      max-width: 900px;
    }

    /* ── Body Text ── */
    .body-text {
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 400;
      line-height: 1.7;
      color: var(--powder-300);
      max-width: 800px;
      opacity: 0.88;
    }

    /* ── Corner Label ── */
    .corner-label {
      position: absolute;
      top: 48px;
      left: 48px;
      z-index: 25;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 4px;
      color: var(--b-text-muted);
      text-transform: uppercase;
      opacity: 0.5;
    }

    /* ── Bottom-right Bharatvarsh label ── */
    .bhv-label {
      position: absolute;
      bottom: 32px;
      right: 48px;
      z-index: 25;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 3px;
      color: var(--b-text-muted);
      text-transform: uppercase;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="canvas film-grain vignette">
    <!-- Background image -->
    <div class="bg-image" id="bgImage"></div>

    <!-- Dark overlay -->
    <div class="dark-overlay"></div>

    <!-- Corner label -->
    <div class="corner-label">BEHIND THE BUILD</div>

    <!-- Content -->
    <div class="content">
      <div class="accent-bar"></div>
      <div class="headline" id="headline">CRAFTING THE FICTION</div>
      <div class="body-text" id="bodyText">
        Every world is built from intent, constraint, and detail. Bharatvarsh exists in the spaces between surveillance and resistance.
        This is how we design dystopia.
      </div>
    </div>

    <!-- Label -->
    <div class="bhv-label">BHARATVARSH</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    if (params.get('backgroundImage')) {
      document.getElementById('bgImage').style.backgroundImage = `url(${params.get('backgroundImage')})`;
    }
    if (params.get('headline')) {
      document.getElementById('headline').textContent = params.get('headline');
    }
    if (params.get('bodyText')) {
      document.getElementById('bodyText').textContent = params.get('bodyText');
    }
  </script>
</body>
</html>
