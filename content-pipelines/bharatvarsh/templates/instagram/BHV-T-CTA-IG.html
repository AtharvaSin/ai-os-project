<!DOCTYPE html>
<!--
  Bharatvarsh Content Ops — Call-to-Action Card (Instagram Feed)
  Dimensions: 1080×1080 (1:1)
  Template ID: BHV-T-CTA-IG

  Slot variables (pass via URL params or JS injection):
    backgroundImage  — URL or base64 of background image
    ctaHeadline      — Main CTA headline
    ctaButtonText    — Button label text
    url              — URL/destination (displayed, not functional)

  Rendering: Puppeteer screenshot at 1080×1080 viewport.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --obsidian-950: #0A0D12;
      --obsidian-900: #0F1419;
      --obsidian-800: #1A1F2E;
      --obsidian-700: #252A3B;
      --obsidian-600: #323848;
      --mustard-500: #F1C232;
      --mustard-400: #F5D56A;
      --powder-300: #C9DBEE;
      --b-text-primary: #F0F4F8;
      --b-text-secondary: #A0AEC0;
      --b-text-muted: #718096;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: var(--obsidian-900);
      font-family: 'Inter', sans-serif;
    }

    .canvas {
      position: relative;
      width: 1080px;
      height: 1080px;
      overflow: hidden;
    }

    /* ── Background Image ── */
    .bg-image {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-size: cover;
      background-position: center;
      z-index: 1;
    }

    /* ── Dark Gradient from Bottom ── */
    .gradient-bottom {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 75%;
      z-index: 6;
      background: linear-gradient(
        to top,
        rgba(15, 20, 25, 0.95) 0%,
        rgba(15, 20, 25, 0.8) 30%,
        transparent 100%
      );
    }

    /* ── Film Grain ── */
    .film-grain::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px;
    }

    /* ── Vignette ── */
    .vignette::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 8;
      background: radial-gradient(
        ellipse at center,
        transparent 40%,
        rgba(10, 13, 18, 0.5) 75%,
        rgba(10, 13, 18, 0.8) 100%
      );
    }

    /* ── Content Layer ── */
    .content {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 20;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      padding: 100px 72px;
      text-align: center;
    }

    /* ── CTA Headline ── */
    .cta-headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px;
      line-height: 1.15;
      letter-spacing: 2px;
      color: var(--mustard-500);
      text-shadow: 0 0 40px rgba(241, 194, 50, 0.2);
      margin-bottom: 40px;
      max-width: 900px;
    }

    /* ── Visual Button (not functional) ── */
    .button-visual {
      display: inline-block;
      padding: 16px 48px;
      border: 2px solid var(--mustard-500);
      background: transparent;
      color: var(--powder-300);
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 32px;
      opacity: 0.9;
    }

    /* ── URL Display ── */
    .url-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 1px;
      color: var(--b-text-muted);
      opacity: 0.6;
      text-transform: lowercase;
    }

    /* ── Bottom-right Bharatvarsh label ── */
    .bhv-label {
      position: absolute;
      bottom: 32px;
      right: 48px;
      z-index: 25;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 3px;
      color: var(--b-text-muted);
      text-transform: uppercase;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="canvas film-grain vignette">
    <!-- Background image -->
    <div class="bg-image" id="bgImage"></div>

    <!-- Dark gradient overlay -->
    <div class="gradient-bottom"></div>

    <!-- Content -->
    <div class="content">
      <div class="cta-headline" id="ctaHeadline">ENTER THE MESH</div>
      <div class="button-visual" id="ctaButtonText">DECLASSIFY</div>
      <div class="url-display" id="urlDisplay">welcometobharatvarsh.com</div>
    </div>

    <!-- Label -->
    <div class="bhv-label">BHARATVARSH</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    if (params.get('backgroundImage')) {
      document.getElementById('bgImage').style.backgroundImage = `url(${params.get('backgroundImage')})`;
    }
    if (params.get('ctaHeadline')) {
      document.getElementById('ctaHeadline').textContent = params.get('ctaHeadline');
    }
    if (params.get('ctaButtonText')) {
      document.getElementById('ctaButtonText').textContent = params.get('ctaButtonText');
    }
    if (params.get('url')) {
      document.getElementById('urlDisplay').textContent = params.get('url');
    }
  </script>
</body>
</html>
