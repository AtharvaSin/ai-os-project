<!DOCTYPE html>
<!--
  Bharatvarsh Content Ops — Quote Card Template (Instagram Feed)
  Dimensions: 1080×1080 (1:1)
  Template ID: BHV-T-QUOTE-IG

  Slot variables (pass via URL params or JS injection):
    backgroundImage  — URL or base64 of background image
    quoteText        — The quote text to display
    attribution      — Optional attribution line (e.g., "— Kahaan")
    showClassified   — "true" to show CLASSIFIED // BHARATVARSH watermark

  Rendering: Puppeteer screenshot at 1080×1080 viewport.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Brand Tokens (Context B) ── */
    :root {
      --obsidian-950: #0A0D12;
      --obsidian-900: #0F1419;
      --obsidian-800: #1A1F2E;
      --obsidian-700: #252A3B;
      --obsidian-600: #323848;
      --mustard-500: #F1C232;
      --mustard-400: #F5D56A;
      --powder-300: #C9DBEE;
      --b-text-primary: #F0F4F8;
      --b-text-secondary: #A0AEC0;
      --b-text-muted: #718096;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: var(--obsidian-900);
      font-family: 'Inter', sans-serif;
    }

    .canvas {
      position: relative;
      width: 1080px;
      height: 1080px;
      overflow: hidden;
    }

    /* ── Background Image ── */
    .bg-image {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-size: cover;
      background-position: center;
      z-index: 1;
    }

    /* ── Film Grain ── */
    .film-grain::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px;
    }

    /* ── Vignette ── */
    .vignette::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 8;
      background: radial-gradient(
        ellipse at center,
        transparent 40%,
        rgba(10, 13, 18, 0.5) 75%,
        rgba(10, 13, 18, 0.8) 100%
      );
    }

    /* ── Dark Gradient from Bottom ── */
    .gradient-bottom {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 70%;
      z-index: 6;
      background: linear-gradient(
        to top,
        rgba(15, 20, 25, 0.95) 0%,
        rgba(15, 20, 25, 0.7) 35%,
        transparent 100%
      );
    }

    /* ── Content Layer ── */
    .content {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 20;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 80px 72px;
    }

    /* ── Quote Text ── */
    .quote-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 56px;
      line-height: 1.15;
      letter-spacing: 1.5px;
      color: var(--mustard-500);
      text-shadow: 0 0 40px rgba(241, 194, 50, 0.2);
      margin-bottom: 24px;
      max-width: 900px;
    }

    /* ── Attribution ── */
    .attribution {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--powder-300);
      text-transform: uppercase;
      opacity: 0.85;
    }

    /* ── Accent Bar ── */
    .accent-bar {
      width: 80px;
      height: 3px;
      background: var(--mustard-500);
      margin-bottom: 32px;
      opacity: 0.7;
    }

    /* ── Classified Watermark Strip ── */
    .watermark {
      position: absolute;
      bottom: 24px;
      right: 32px;
      z-index: 25;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 4px;
      color: var(--b-text-muted);
      text-transform: uppercase;
      opacity: 0.4;
    }

    /* ── Surveillance Grid (subtle) ── */
    .surveillance-grid::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 4;
      opacity: 0.02;
      background-image:
        linear-gradient(rgba(201, 219, 238, 0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201, 219, 238, 0.3) 1px, transparent 1px);
      background-size: 40px 40px;
    }
  </style>
</head>
<body>
  <div class="canvas film-grain vignette surveillance-grid">
    <!-- Background image — set via JS or inline style -->
    <div class="bg-image" id="bgImage"></div>

    <!-- Dark gradient overlay for text readability -->
    <div class="gradient-bottom"></div>

    <!-- Content -->
    <div class="content">
      <div class="accent-bar"></div>
      <div class="quote-text" id="quoteText">
        Every breath you take is catalogued. Every step mapped. Welcome to the Mesh.
      </div>
      <div class="attribution" id="attribution">— BHARATVARSH</div>
    </div>

    <!-- Classified watermark -->
    <div class="watermark" id="watermark">CLASSIFIED // BHARATVARSH</div>
  </div>

  <script>
    // Populate from URL params (for Puppeteer rendering)
    const params = new URLSearchParams(window.location.search);

    if (params.get('backgroundImage')) {
      document.getElementById('bgImage').style.backgroundImage = `url(${params.get('backgroundImage')})`;
    }
    if (params.get('quoteText')) {
      document.getElementById('quoteText').textContent = params.get('quoteText');
    }
    if (params.get('attribution')) {
      document.getElementById('attribution').textContent = params.get('attribution');
    }
    if (params.get('showClassified') === 'false') {
      document.getElementById('watermark').style.display = 'none';
    }
  </script>
</body>
</html>
