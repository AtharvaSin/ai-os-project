steps:
  # 1. Build image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--platform=linux/amd64'
      - '-t'
      - 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/daily-brief-engine:$SHORT_SHA'
      - '-t'
      - 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/daily-brief-engine:latest'
      - '.'

  # 2. Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/daily-brief-engine'

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'daily-brief-engine'
      - '--image=asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/daily-brief-engine:$SHORT_SHA'
      - '--region=asia-south1'
      - '--service-account=ai-os-cloud-run@ai-operating-system-490208.iam.gserviceaccount.com'
      - '--add-cloudsql-instances=bharatvarsh-website:us-central1:bharatvarsh-db'
      - '--set-secrets=AI_OS_DB_PASSWORD=AI_OS_DB_PASSWORD:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,GOOGLE_REFRESH_TOKEN=GOOGLE_REFRESH_TOKEN:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest'
      - '--set-env-vars=DB_INSTANCE=bharatvarsh-website:us-central1:bharatvarsh-db,DB_USER=ai_os_admin,DB_NAME=ai_os,TELEGRAM_BRIEF_ENABLED=true,BRIEF_DRIVE_FOLDER=AI OS/AI Operating System/Daily Briefs'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=120'
      - '--min-instances=0'
      - '--max-instances=1'
      - '--no-allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/daily-brief-engine:$SHORT_SHA'
  - 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/daily-brief-engine:latest'
