steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--platform=linux/amd64'
      - '-t'
      - 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/telegram-notifications:$SHORT_SHA'
      - '-t'
      - 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/telegram-notifications:latest'
      - '.'
    dir: 'workflows/category-b/telegram-notifications'

  # Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/telegram-notifications']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'telegram-notifications'
      - '--image=asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/telegram-notifications:$SHORT_SHA'
      - '--region=asia-south1'
      - '--service-account=ai-os-cloud-run@ai-operating-system-490208.iam.gserviceaccount.com'
      - '--add-cloudsql-instances=bharatvarsh-website:us-central1:bharatvarsh-db'
      - '--set-secrets=AI_OS_DB_PASSWORD=AI_OS_DB_PASSWORD:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest'
      - '--set-env-vars=DB_NAME=ai_os,DB_USER=ai_os_admin'
      - '--min-instances=0'
      - '--max-instances=1'
      - '--memory=256Mi'
      - '--no-allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/telegram-notifications:$SHORT_SHA'
  - 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/telegram-notifications:latest'
