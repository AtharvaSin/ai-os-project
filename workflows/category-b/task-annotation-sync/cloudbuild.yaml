steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/task-annotation-sync:$SHORT_SHA'
      - '-t'
      - 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/task-annotation-sync:latest'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/task-annotation-sync:$SHORT_SHA'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/task-annotation-sync:latest'
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'task-annotation-sync'
      - '--image'
      - 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/task-annotation-sync:$SHORT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--memory'
      - '256Mi'
      - '--timeout'
      - '120'
      - '--max-instances'
      - '1'
      - '--no-allow-unauthenticated'
      - '--service-account'
      - 'ai-os-cloud-functions@ai-operating-system-490208.iam.gserviceaccount.com'
      - '--add-cloudsql-instances'
      - 'bharatvarsh-website:us-central1:bharatvarsh-db'
      - '--set-secrets'
      - 'DB_PASSWORD=AI_OS_DB_PASSWORD:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,GOOGLE_REFRESH_TOKEN=GOOGLE_REFRESH_TOKEN:latest'
images:
  - 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/task-annotation-sync:$SHORT_SHA'
  - 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/task-annotation-sync:latest'
