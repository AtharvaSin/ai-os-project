steps:
  # Build Docker image with commit SHA and latest tags
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--platform=linux/amd64'
      - '-t'
      - 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/task-annotation-sync:$SHORT_SHA'
      - '-t'
      - 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/task-annotation-sync:latest'
      - '.'
    dir: 'workflows/category-b/task-annotation-sync'

  # Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/task-annotation-sync']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'task-annotation-sync'
      - '--image=asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/task-annotation-sync:$SHORT_SHA'
      - '--region=asia-south1'
      - '--service-account=ai-os-cloud-functions@ai-operating-system-490208.iam.gserviceaccount.com'
      - '--add-cloudsql-instances=bharatvarsh-website:us-central1:bharatvarsh-db'
      - '--set-secrets=DB_PASSWORD=AI_OS_DB_PASSWORD:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,GOOGLE_REFRESH_TOKEN=GOOGLE_REFRESH_TOKEN:latest'
      - '--min-instances=0'
      - '--max-instances=1'
      - '--memory=256Mi'
      - '--timeout=120'
      - '--no-allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/task-annotation-sync:$SHORT_SHA'
  - 'asia-south1-docker.pkg.dev/ai-operating-system-490208/ai-os-images/task-annotation-sync:latest'
